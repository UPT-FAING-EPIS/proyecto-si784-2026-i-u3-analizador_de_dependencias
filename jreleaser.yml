project:
  name: depanalyzer
  description: Dependency Analyzer CLI
  longDescription: Command line interface for analyzing Java project dependencies and vulnerabilities.
  license: MIT
  copyright: 2026 Andre Carbajal
  links:
    homepage: https://github.com/UPT-FAING-EPIS/proyecto-si784-2026-i-u2-analizador-de-dependencias-2
  authors:
    - Andre Carbajal
  stereotype: CLI

release:
  github:
    owner: UPT-FAING-EPIS
    name: proyecto-si784-2026-i-u2-analizador-de-dependencias-2
    overwrite: false
    update:
      enabled: true
      sections:
        - ASSETS
    draft: false
    prerelease:
      enabled: false
    changelog:
      enabled: false

checksum:
  individual: true
  name: checksums.txt
  algorithms:
    - SHA-256

distributions:
  depanalyzer:
    type: BINARY
    executable:
      name: depanalyzer
    artifacts:
      - path: dist/depanalyzer-linux-amd64.tar.gz
        platform: linux-x86_64
      - path: dist/depanalyzer-macos-arm64.zip
        platform: osx-aarch_64
      - path: dist/depanalyzer-windows-amd64.zip
        platform: windows-x86_64

packagers:
  brew:
    active: ALWAYS
    continueOnError: false
    formulaName: depanalyzer
    multiPlatform: true
    repository:
      active: ALWAYS
      owner: andre-carbajal
      name: homebrew-tap
      branch: master
      username: andre-carbajal
      token: '{{ env.HOMEBREW_TAP_TOKEN }}'
  scoop:
    active: ALWAYS
    continueOnError: false
    packageName: depanalyzer
    repository:
      active: ALWAYS
      owner: andre-carbajal
      name: scoop-bucket
      branch: master
      username: andre-carbajal
      token: '{{ env.SCOOP_BUCKET_TOKEN }}'
  snap:
    active: ALWAYS
    continueOnError: false
    packageName: depanalyzer
    repository:
      active: ALWAYS
      owner: andre-carbajal
      name: depanalyzer-snap
      branch: master
      username: andre-carbajal
      token: '{{ env.SNAP_REPO_TOKEN }}'
    remoteBuild: true
    grade: stable
    confinement: strict
    base: core22
    architectures:
      - buildOn: [ amd64 ]
        runOn: [ amd64 ]
      - buildOn: [ arm64 ]
        runOn: [ arm64 ]
