name: Terraform Infrastructure

on:
  pull_request:
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [union]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: Apply the infrastructure changes
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

concurrency:
  group: terraform-infrastructure
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_github_token: ${{ secrets.TERRAFORM_GITHUB_TOKEN || github.token }}
      HAS_TERRAFORM_ADMIN_TOKEN: ${{ secrets.TERRAFORM_GITHUB_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"

      - name: Format
        run: terraform fmt -check -recursive

      - name: Initialize
        run: terraform init

      - name: Validate
        run: terraform validate

      - name: Import existing Pages environment
        continue-on-error: true
        run: terraform import github_repository_environment.pages "${{ github.event.repository.name }}:github-pages"

      - name: Import existing public URL variable
        continue-on-error: true
        run: terraform import github_actions_variable.public_site_url "${{ github.event.repository.name }}:PUBLIC_SITE_URL"

      - name: Import existing coverage variable
        continue-on-error: true
        run: terraform import github_actions_variable.minimum_coverage "${{ github.event.repository.name }}:MINIMUM_COVERAGE"

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Add cost estimate to summary
        run: |
          {
            echo "## Terraform"
            echo ""
            echo "- Environment: github-pages"
            echo "- Minimum coverage: 70%"
            echo "- Estimated direct infrastructure cost: USD 0.00/month"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply
        if: github.event_name == 'workflow_dispatch' && inputs.apply == true && env.HAS_TERRAFORM_ADMIN_TOKEN == 'true'
        run: terraform apply -auto-approve tfplan

      - name: Record pending apply
        if: github.event_name != 'workflow_dispatch' || inputs.apply != true || env.HAS_TERRAFORM_ADMIN_TOKEN != 'true'
        run: |
          {
            echo ""
            echo "Plan validated. Apply was skipped."
            echo "To apply, configure TERRAFORM_GITHUB_TOKEN with repository administration access and run this workflow manually with apply=true."
          } >> "$GITHUB_STEP_SUMMARY"
