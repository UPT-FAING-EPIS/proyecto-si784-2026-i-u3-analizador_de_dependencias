name: VS Code Extension

on:
  push:
    branches: [main]
    tags:
      - "vscode-v*"
    paths:
      - "integrations/vscode/**"
      - "src/**"
      - "build.gradle.kts"
      - "gradle/**"
      - "gradlew*"
      - ".github/workflows/vscode-extension.yml"
  pull_request:
    paths:
      - "integrations/vscode/**"
      - "src/**"
      - "build.gradle.kts"
      - "gradle/**"
      - "gradlew*"
      - ".github/workflows/vscode-extension.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the current package version to Visual Studio Marketplace
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: integrations/vscode/package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle

      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev
      - run: npm run bundle:cli
      - run: npx vsce package --out depanalyzer-vscode.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: depanalyzer-vscode
          path: integrations/vscode/depanalyzer-vscode.vsix
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/vscode-v') || inputs.publish == true
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: integrations/vscode/package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle

      - run: npm ci
      - run: npm run bundle:cli

      - name: Verify Marketplace token
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is required to publish." >&2
            exit 1
          fi

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish -p "$VSCE_PAT"
