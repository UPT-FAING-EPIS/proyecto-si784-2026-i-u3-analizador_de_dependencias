name: CI

on:
  push:
    branches: [ union ]
  pull_request:
    branches: [ union ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m"
      OSS_INDEX_TOKEN: ${{ secrets.OSS_INDEX_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Tests with Gradle
      run: ./gradlew test

    - name: Build Project
      run: ./gradlew assemble

  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/mcp
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: npm
        cache-dependency-path: integrations/mcp/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build and test MCP server
      run: npm test
